spring:
  application:
    name: account-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${ACCOUNT_DB_URL:jdbc:postgresql://localhost:5432/account_service}
    username: ${ACCOUNT_DB_USERNAME:bankcore}
    password: ${ACCOUNT_DB_PASSWORD:bankcore}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${ACCOUNT_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${ACCOUNT_DB_MIN_IDLE:2}
      pool-name: account-service-hikari
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  cache:
    type: redis
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}

server:
  port: ${ACCOUNT_SERVICE_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.bankcore.account: INFO
    org.hibernate.SQL: WARN
